# AgentOS Studio — local development stack.
# Brings up Postgres with pgvector for the canonical data layer, plus optional
# Supabase services (PostgREST + Studio) so contributors can run the full app
# locally without a hosted Supabase project.
#
# Quick start:
#   docker compose -f infra/docker-compose.yml up -d postgres
#   pnpm migrate
#   pnpm dev
#
# Full Supabase-compatible stack (PostgREST + Studio):
#   docker compose -f infra/docker-compose.yml --profile supabase up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentos
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: agentos-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:postgres@postgres:5432/agentos
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: ${SUPABASE_SERVICE_ROLE_KEY:-local-dev-service-role-key-please-replace}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:54321
    ports:
      - "54321:3000"
    profiles: ["supabase"]

  studio:
    image: supabase/studio:20240414-2c81b56
    container_name: agentos-supabase-studio
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://postgres:5432
      DEFAULT_ORGANIZATION_NAME: AgentOS
      DEFAULT_PROJECT_NAME: agentos-local
      SUPABASE_URL: http://localhost:54321
      SUPABASE_PUBLIC_URL: http://localhost:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    ports:
      - "54323:3000"
    profiles: ["supabase"]

volumes:
  postgres_data:
